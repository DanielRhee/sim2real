apiVersion: apps/v1
kind: Deployment
metadata:
  name: djrhee-sim2real
spec:
  replicas: 1
  selector:
    matchLabels:
      app: djrhee-sim2real
  template:
    metadata:
      labels:
        app: djrhee-sim2real
    spec:
      hostname: djrhee-sim2real
      containers:
      - name: djrhee-sim2real
        image: ghcr.io/selkies-project/nvidia-glx-desktop:24.04-20240924062704
        command: ["/bin/bash"]
        env:
        - name: TZ
          value: "UTC"
        - name: PASSWD
          valueFrom:
            secretKeyRef:
              name: my-pass
              key: my-pass
        stdin: true
        tty: true
        resources:
          limits:
            memory: 4Gi
            cpu: "6"
            nvidia.com/gpu: 0
            ephemeral-storage: 35Gi
          requests:
            memory: 4Gi
            cpu: "6"
            nvidia.com/gpu: 0
            ephemeral-storage: 35Gi
        volumeMounts:
        - mountPath: /dev/shm
          name: dshm
        - mountPath: /cache
          name: cache-vol
        - mountPath: /home/ubuntu/persistent
          name: root-vol
      dnsPolicy: None
      dnsConfig:
        nameservers:
        - 8.8.8.8
        - 8.8.4.4
      volumes:
      - name: dshm
        emptyDir: {}
      - name: cache-vol
        emptyDir: {}
      - name: root-vol
        persistentVolumeClaim:
          claimName: sim2real-challenge
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: topology.kubernetes.io/zone
                operator: NotIn
                values:
                - ucsd-suncave
              - key: nvidia.com/gpu.product
                operator: In
                values:
                - Tesla-V100-SXM2-16GB